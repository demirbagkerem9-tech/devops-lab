name: DevOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:

      - name: Repo çek
        uses: actions/checkout@v3

      - name: Docker login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Docker build
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-app .

      - name: Docker push
        run: docker push ${{ secrets.DOCKER_USERNAME }}/devops-app

      - name: Container test çalıştır
        run: docker run ${{ secrets.DOCKER_USERNAME }}/devops-app
